<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Vitality Kitchen - Nourish Your Journey" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- 1. The Tailwind Engine (Makes classes like bg-primary work) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- 2. Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- 3. Your Custom Theme Configuration (The definitions for your colors) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary": "#0f5238",
              "primary-container": "#2d6a4f",
              "on-primary": "#ffffff",
              "secondary": "#895100",
              "secondary-container": "#fd9d1a",
              "background": "#f8f9fa",
              "surface": "#f8f9fa",
              "on-surface": "#191c1d",
              "emerald-900": "#064e3b",
            },
            fontFamily: {
              "headline": ["Lexend", "sans-serif"],
              "body": ["Plus Jakarta Sans", "sans-serif"],
            }
          }
        }
      }
    </script>

    <title>Vitality Kitchen | Nourish Your Journey</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
